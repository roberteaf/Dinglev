<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1.lol | Dinglev Arena</title>
    <style>
        :root { --neon: #4CAF50; --bg: #050505; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Arial Black', sans-serif; color: white; }
        
        /* LOADING SCREEN */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        h1 { font-size: 5rem; font-style: italic; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 0; }
        #loading-bar { width: 300px; height: 8px; background: #222; border: 1px solid #444; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.2s; }

        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid var(--neon); border-radius: 50%; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: var(--neon); transform: translate(-50%, -50%); border-radius: 50%; }
        #health { position: absolute; bottom: 30px; left: 30px; border-left: 5px solid var(--neon); padding-left: 15px; }
        #hp-text { font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>1V1.LOL</h1>
        <div id="loading-bar"><div id="fill"></div></div>
        <p id="status" style="color: #888; margin-top: 10px;">CONNECTING TO DINGLEV REPO...</p>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="health">
            <div id="hp-text">100 HP</div>
            <div style="width: 200px; height: 10px; background: #222; margin-top: 5px;"><div style="width: 100%; height: 100%; background: var(--neon);"></div></div>
        </div>
    </div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
  }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const BASE = "https://raw.githubusercontent.com/roberteaf/Dinglev/main/";
    const ASSETS = {
        map:  BASE + "tripo_pbr_model_f8b11be6-bd08-4c3a-8a49-c7d5830be153.glb",
        idle: BASE + "Idle.fbx",
        walk: BASE + "Walking.fbx",
        run:  BASE + "Running.fbx",
        aim:  BASE + "Rifle%20Aiming%20Idle.fbx"
    };

    let scene, camera, renderer, clock, mixer, player;
    const actions = {};
    let currentAction;
    const keys = { w: false, a: false, s: false, d: false, shift: false, space: false };
    
    // PHYSICS
    let velocityY = 0;
    let isJumping = false;
    const gravity = -1.2; 
    const jumpPower = 0.4;

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 1, 1000);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 50, 10);
        scene.add(light);

        const manager = new THREE.LoadingManager();
        manager.onProgress = (u, l, t) => { document.getElementById('fill').style.width = (l/t*100) + '%'; };
        manager.onLoad = () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            animate();
        };

        const gltfLoader = new GLTFLoader(manager);
        const fbxLoader = new FBXLoader(manager);

        // 1. LOAD MAP (Big scale so you aren't tiny)
        gltfLoader.load(ASSETS.map, (gltf) => {
            const map = gltf.scene;
            map.scale.set(100, 100, 100); 
            scene.add(map);
        });

        // 2. LOAD PLAYER
        fbxLoader.load(ASSETS.idle, (char) => {
            player = char;
            player.scale.set(0.015, 0.015, 0.015);
            scene.add(player);
            mixer = new THREE.AnimationMixer(player);

            const load = (name, url) => {
                fbxLoader.load(url, (anim) => {
                    actions[name] = mixer.clipAction(anim.animations[0]);
                    // FIX: Make walking and running loop forever
                    if (name === 'walk' || name === 'run') actions[name].setLoop(THREE.LoopRepeat);
                    if (name === 'idle') { currentAction = actions[name]; currentAction.play(); }
                });
            };

            load('idle', ASSETS.idle);
            load('walk', ASSETS.walk);
            load('run',  ASSETS.run);
            load('aim',  ASSETS.aim);
        });

        window.onkeydown = (e) => { 
            const k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k] = true;
            if(e.code === 'Space') keys.space = true;
        };
        window.onkeyup = (e) => { 
            const k = e.key.toLowerCase();
            if(keys.hasOwnProperty(k)) keys[k] = false;
            if(e.code === 'Space') keys.space = false;
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        if (mixer) mixer.update(dt);

        if (player) {
            // MOVEMENT
            const speed = keys.shift ? 0.6 : 0.25;
            const rotSpeed = 0.06;

            if (keys.w) player.translateZ(speed);
            if (keys.s) player.translateZ(-speed);
            if (keys.a) player.rotation.y += rotSpeed;
            if (keys.d) player.rotation.y -= rotSpeed;

            // JUMP & GRAVITY PHYSICS
            if (keys.space && !isJumping) {
                isJumping = true;
                velocityY = jumpPower;
            }

            if (isJumping || player.position.y > 0) {
                player.position.y += velocityY;
                velocityY += gravity * dt; // Pull down over time
            }

            // Ground Collision (Simplest version)
            if (player.position.y <= 0) {
                player.position.y = 0;
                isJumping = false;
                velocityY = 0;
            }

            // ANIMATION CHANGER
            let next = actions['idle'];
            if (keys.w || keys.s) next = keys.shift ? actions['run'] : actions['walk'];

            if (next && currentAction !== next) {
                next.reset().fadeIn(0.15).play();
                currentAction.fadeOut(0.15);
                currentAction = next;
            }

            // TPP CAMERA (FORTNITE STYLE)
            // We set the camera behind the player's back
            const camOffset = new THREE.Vector3(0, 8, -18); 
            camOffset.applyQuaternion(player.quaternion);
            camOffset.add(player.position);
            
            camera.position.lerp(camOffset, 0.1); // Smooth follow
            camera.lookAt(player.position.x, player.position.y + 4, player.position.z);
        }

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
