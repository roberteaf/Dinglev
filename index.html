<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animal Company - GitHub Physics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: #4CAF50; display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #bar-bg { width: 300px; height: 10px; border: 1px solid #4CAF50; margin-top: 10px; }
        #bar-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.2s; }
        #instructions { position: absolute; bottom: 20px; left: 20px; color: white; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1>SYNCING WITH GITHUB...</h1>
        <div id="bar-bg"><div id="bar-fill"></div></div>
    </div>

    <div id="instructions">WASD: MOVE | SHIFT: SPRINT | SPACE: JUMP</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
import { FBXLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/FBXLoader.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/GLTFLoader.js';

// --- GITHUB RAW LINKS ---
const GITHUB_ASSETS = {
    map: 'https://raw.githubusercontent.com/roberteaf/Dinglev/main/tripo_pbr_model_f8b11be6-bd08-4c3a-8a49-c7d5830be153.glb',
    idle: 'https://raw.githubusercontent.com/roberteaf/Dinglev/main/Idle.fbx',
    walk: 'https://raw.githubusercontent.com/roberteaf/Dinglev/main/Walking.fbx',
    run:  'https://raw.githubusercontent.com/roberteaf/Dinglev/main/Running.fbx',
    aim:  'https://raw.githubusercontent.com/roberteaf/Dinglev/main/Rifle%20Aiming%20Idle.fbx'
};

let scene, camera, renderer, mixer, player, clock;
const actions = {};
let currentAction;
const keys = { w: false, a: false, s: false, d: false, shift: false, space: false };

// Physics state
let velocityY = 0;
let isJumping = false;
const gravity = -0.015;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    clock = new THREE.Clock();

    const manager = new THREE.LoadingManager();
    manager.onProgress = (u, l, t) => { document.getElementById('bar-fill').style.width = (l/t*100)+'%'; };
    manager.onLoad = () => { document.getElementById('loading-screen').style.display = 'none'; animate(); };

    const gltfLoader = new GLTFLoader(manager);
    const fbxLoader = new FBXLoader(manager);

    // 1. Load Map
    gltfLoader.load(GITHUB_ASSETS.map, (gltf) => {
        const map = gltf.scene;
        map.scale.set(50, 50, 50);
        scene.add(map);
    });

    // 2. Load Player
    fbxLoader.load(GITHUB_ASSETS.idle, (character) => {
        player = character;
        player.scale.set(0.01, 0.01, 0.01);
        scene.add(player);
        mixer = new THREE.AnimationMixer(player);

        const loadAnim = (name, url) => {
            fbxLoader.load(url, (anim) => {
                actions[name] = mixer.clipAction(anim.animations[0]);
                if (name === 'idle') { currentAction = actions[name]; currentAction.play(); }
            });
        };

        loadAnim('idle', GITHUB_ASSETS.idle);
        loadAnim('walk', GITHUB_ASSETS.walk);
        loadAnim('run', GITHUB_ASSETS.run);
        loadAnim('aim', GITHUB_ASSETS.aim);
    });

    // Input Events
    window.onkeydown = (e) => { 
        const k = e.key.toLowerCase();
        if(keys.hasOwnProperty(k)) keys[k] = true;
        if(e.code === 'Space') keys.space = true;
    };
    window.onkeyup = (e) => { 
        const k = e.key.toLowerCase();
        if(keys.hasOwnProperty(k)) keys[k] = false;
        if(e.code === 'Space') keys.space = false;
    };
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);

    if (player) {
        // --- MOVEMENT PHYSICS ---
        let moveSpeed = keys.shift ? 0.3 : 0.15;
        let rotSpeed = 0.04;

        if (keys.w) player.translateZ(moveSpeed);
        if (keys.s) player.translateZ(-moveSpeed);
        if (keys.a) player.rotation.y += rotSpeed;
        if (keys.d) player.rotation.y -= rotSpeed;

        // --- JUMPING PHYSICS ---
        if (keys.space && !isJumping) {
            isJumping = true;
            velocityY = 0.35; // Initial lift
        }

        if (isJumping || player.position.y > 0) {
            player.position.y += velocityY;
            velocityY += gravity; // Pull down
        }

        if (player.position.y <= 0) {
            player.position.y = 0;
            isJumping = false;
            velocityY = 0;
        }

        // --- ANIMATION CONTROLLER ---
        let next = actions['idle'];
        if (keys.w || keys.s) {
            next = keys.shift ? actions['run'] : actions['walk'];
        }

        if (next && currentAction !== next) {
            next.reset().fadeIn(0.2).play();
            currentAction.fadeOut(0.2);
            currentAction = next;
        }

        // --- CAMERA FOLLOW ---
        // Offset the camera behind the player
        const offset = new THREE.Vector3(0, 7, -15); 
        offset.applyQuaternion(player.quaternion);
        camera.position.copy(player.position).add(offset);
        camera.lookAt(player.position.x, player.position.y + 3, player.position.z);
    }

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
